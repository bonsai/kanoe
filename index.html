<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長良川カヌー川下りゲーム 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Camera feed for pose detection -->
        <video id="input-video" style="display:none;"></video>
        <canvas id="output-canvas" style="position:absolute;bottom:10px;right:10px;width:160px;height:120px;z-index:150;border:2px solid #4CAF50;border-radius:8px;"></canvas>

        <div id="ui">
            <div>スコア：<span id="score">0</span></div>
            <div>速度：<span id="speed">1.0</span> km/h</div>
            <div>高度：<span id="altitude">2.0</span> m</div>
        </div>
        
        <!-- Pose detection status -->
        <div id="poseStatus" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#4CAF50;padding:10px 20px;border-radius:8px;z-index:150;font-size:16px;font-weight:bold;">
            📷 ポーズ検出：準備中...
        </div>

        <div id="bridgeInfo">
            <div id="nextBridge">次の橋を準備中...</div>
        </div>
          <div id="controls">
            <button id="paddleBtn" class="control-btn">漕ぐ ⛵<br><span class="key-hint">(↑キー/W)</span></button>
            <button id="duckBtn" class="control-btn">しゃがむ ⬇️<br><span class="key-hint">(↓キー/S)</span></button>
        </div>

        <div id="warning" class="warning">
            橋が近づいています！しゃがんで！
        </div>

        <div id="duckingIndicator">
            しゃがみ中
        </div>
        
        <!-- Head control hints -->
        <div id="headControlHint" style="position:absolute;bottom:150px;right:10px;background:rgba(0,0,0,0.7);color:white;padding:10px;border-radius:8px;z-index:150;font-size:12px;text-align:left;">
            <div style="font-weight:bold;margin-bottom:5px;">🎮 頭の動きで操作:</div>
            <div>👇 下を向く：しゃがむ</div>
            <div>👈 左：左に移動</div>
            <div>👉 右：右に移動</div>
        </div>

        <div id="gameOver">
            <h2>ゲームオーバー!</h2>
            <p>橋に衝突してしまいました...</p>
            <p>最終スコア：<span id="finalScore">0</span></p>
            <button onclick="restartGame()" class="control-btn restart-btn">もう一度プレイ</button>
        </div>
    </div>    <div id="seaAnimation">
        <div class="sea-text">海に到着！<br>おつかれさまでした</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe Pose Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="pose-controller.js"></script>
    <script src="head-controls.js"></script>
    <script src="script.js"></script>
</body>
</html>
